name: Update data and open pull request

on:
  schedule:
    - cron: '0 18 * * 2'

  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  update-definitions:
    name: Update data and open pull request
    permissions:
      contents: write       # This workflow updates data and opens a pull request.
      issues: write         # This workflow updates data and opens a pull request.
      pull-requests: write  # This workflow updates data and opens a pull request.

    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            index.rubygems.org:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            rubygems.org:443
            svn.apache.org:80
            www.iana.org:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: '3.3'
          rubygems: 'latest'
          bundler: 2
          bundler-cache: true

      - run: bundle exec rake release:gha

      - run: |
          git switch --create update-mime-types-data/"${UPDATE_VERSION}"
          printf "%s\n\n%s" "${UPDATE_TITLE}" "$(fmt -w 72 "${UPDATE_BODY_PATH}")" |
            git commit --all -F-

          gh pr create --title "${UPDATE_TITLE}" \
             --body-file "${UPDATE_BODY_PATH}" \
             --assignee halostatue \
             --reviewer halostatue \
             --label automated,data-update
